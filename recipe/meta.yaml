{% set name = "h5io" %}
{% set version = "0.2.5" %}
{% set sha256 = "265bc9c24508b30575e8a8806b19cd4440643ff26f8b82b51d0280444807eed8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - numpy
    - setuptools >=64
    - setuptools_scm >=8
  run:
    - python >={{ python_min }}
    - pip
    - numpy
    - h5py

test:
  requires:
    - python {{ python_min }}
  imports:
    - h5io
  commands:
    - pip check
    - python -c "import h5io; assert h5io.__version__ == '{{ version }}', h5io.__version__"

about:
  home: http://github.com/h5io/h5io
  license: BSD-3-Clause
  license_family: BSD
  license_file: {{ environ["RECIPE_DIR"] }}/LICENSE.txt
  summary: Python Objects Onto HDF5
  description: |
    h5io is a package designed to facilitate saving some standard Python objects into the
    forward-compatible HDF5 format. It is a higher-level package than h5py.
  doc_url: https://github.com/h5io/h5io
  dev_url: https://github.com/h5io/h5io

extra:
  recipe-maintainers:
    - larsoner
    - jan-janssen
